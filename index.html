<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Drive Sim</title>
</head>
<body>
  <h1>Drive Sim（維持費シミュレーター）</h1>

  <div id="owned-car-section">
    <h2>所有している車</h2>
    <label>所有していますか？
      <select id="hasOwnedCar">
        <option value="no">いいえ</option>
        <option value="yes">はい</option>
      </select>
    </label>
    <div id="owned-car-fields" style="display:none;">
      <div id="owned-car-selectors"></div>
      <label>走行距離（km）: <input type="number" id="ownedCarMileage"></label>
    </div>
  </div>

  <div id="purchase-candidates">
    <h2>購入候補の車</h2>
    <button id="add-candidate">購入候補を追加</button>
    <div id="candidate-list"></div>
  </div>

  <script src="/drive-sim/js/main.js"></script>
</body>
</html>
